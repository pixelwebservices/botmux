apiVersion: apps/v1
kind: Deployment
metadata:
  name: botmux
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: botmux
  template:
    metadata:
      labels:
        app: botmux
    spec:
      containers:
        - name: botmux
          image: {{ .Values.image }}
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            {{- if .Values.telegramBotToken }}
            - name: TELEGRAM_BOT_TOKEN
              value: {{ .Values.telegramBotToken | quote }}
            {{- end }}
            {{- if .Values.cookieSecure }}
            - name: COOKIE_SECURE
              value: {{ .Values.cookieSecure | quote }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: botmux-data
